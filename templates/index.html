		<body>
			<div class="section-header">
				
				 
			</div>

					<div class="navbar-header col-md-1 col-sm-1"></div>
				</div>
			</nav>
		
			<div class="limiter">
				<div class="container-login100" style="background-image: url(../static/images/background1.jpg);">
					<div class="wrap-login100" style="margin-left:300px">
						<div class="login100-form-title" style="background-image: url(../static/images/background2.jpg);">
							<span class="login100-form-title-1">Upload Image:</span>
						</div>
						<br><br>
						<form class="login100-form validate-form" action="/submit" method="POST" enctype="multipart/form-data">
							<div class="wrap-input100 validate-input m-b-26" data-validate="Username is required">
								<br>
								<input class="input100" type="file" name="my_image" id="imagefile" class="btn" accept="image/*" onchange="previewImage();" required>
							</div>
							<img id="preview">
							<div class="container-login100-form-btn">
								<br><br>
								<center>
									<label><b>Select the Model:</b></label>
									<select name="model" width="190" style="width: 190px">
										<option name="model" value="MobileNet">MobileNet</option>
										<option name="model" value="ResNet152V2">ResNet152V2</option>
									</select>
								</center>
								<br><br>
								<button class="btn btn-primary" type="submit">Submit</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		
			<script>
				function previewImage() {
					var preview = document.querySelector('#preview');
					var file = document.querySelector('input[type=file]').files[0];
					var reader = new FileReader();
		
					reader.onloadend = function () {
						preview.src = reader.result;
					}
		
					if (file) {
						reader.readAsDataURL(file);
					} else {
						preview.src = "";
					}
				}
			</script>
